# Widget-injection layer for Outline (behind the Cloudflare Tunnel).
#
# TLS and public exposure are handled by Cloudflare — the tunnel's ingress
# sends kb.venue.example here over the compose network, and this proxies
# Outline while injecting the AV Ops chat widget script into every page.
# The assistant is NOT proxied here; the tunnel routes
# assistant.venue.example straight to http://assistant:3000.

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    location / {
        proxy_pass http://outline:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare terminated TLS; keep the original scheme for Outline.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Websockets (Outline live collaboration)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Inject the AV Ops chat widget into every Outline page.
        sub_filter '</body>' '<script src="https://assistant.venue.example/widget.js" defer></script></body>';
        sub_filter_once on;
        proxy_set_header Accept-Encoding "";   # sub_filter needs uncompressed HTML
    }
}
