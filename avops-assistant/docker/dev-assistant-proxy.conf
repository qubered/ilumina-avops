# Local-dev sidecar: gives the assistant (a host process on :3100) a stable
# container-network name — http://avops-assistant-proxy.orb.local — so
# Outline's server-side OIDC + webhook calls survive host network changes.
server {
    listen 80;

    location / {
        proxy_pass http://host.docker.internal:3100;
        # Present the host the app knows itself as.
        proxy_set_header Host localhost:3100;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
